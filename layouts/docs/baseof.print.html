<!-- 
  The purpose of this layout is to overwrite the deprecated usage of .Language.LanguageDirection from the Docsy module upstream. 
  Once Docsy has implemented a fix for this deprecation, this layout can be safely removed.  
-->
<!doctype html>
<html itemscope itemtype="http://schema.org/WebPage"
    {{- with site.Language.Direction }} dir="{{ . }}" {{- end -}}
    {{ with site.Language.Name }} lang="{{ . }}" {{- end }} {{/**/ -}}
    class="no-js">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="td-{{ .Kind }}{{ with .Page.Params.body_class }} {{ . }}{{ end }}">
    <header>
      {{ partial "navbar.html" . }}
    </header>
    <div class="container-fluid td-outer">
      <div class="td-main">
        <div class="row flex-xl-nowrap">
          <main class="col-12 col-md-9 col-xl-8 ps-md-5" role="main">
            {{ block "main" . }}{{ end }}
          </main>
        </div>
      </div>
      {{ partial "footer.html" . }}
    </div>
    {{ partial "scripts.html" . }}
  </body>
</html>
